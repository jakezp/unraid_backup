###############################################################################
# backuparr.conf — Global configuration for backuparr.sh
#
# This file is sourced by backuparr.sh before any per-app configs.
# CLI flags override values set here.
# Per-app .conf files override these defaults for individual containers.
###############################################################################

# Where local backups are stored (Live/ and Snapshots/ subdirs per container)
BACKUP_LOCATION=/mnt/user/backup

# rclone remote destination (e.g. gdrive:unraid_backup). Leave empty to skip.
GDRIVE_LOCATION=gdrive:unraid_backup

# Default docker stop timeout in seconds (0 = don't stop the container)
DEFAULT_TIMEOUT=30

# Default number of local delta (Changes/) directories to keep per app
# Each Changes/YYYY-MM-DD/ dir holds only files that changed or were deleted
# that day — not full copies. Works on any filesystem including Unraid shares.
DEFAULT_LOCAL_SNAPSHOTS=3

# Default number of remote versioned backup-dirs to keep per app
DEFAULT_REMOTE_SNAPSHOTS=7

# Use incremental rclone (--backup-dir with dated versions) instead of plain sync
# When true: rclone copy --backup-dir remote/Versions/YYYY-MM-DD
# When false: rclone sync (old behaviour, overwrites remote each time)
GDRIVE_INCREMENTAL=true

# Global rsync excludes applied to ALL containers
# These are used in BOTH rsync passes (pre-stop and post-stop)
EXCLUDE=(profile/lock '*.pid' '*.sample' '*.lock' /lock)

# Additional excludes applied ONLY to the pre-stop rsync pass
# (files that change too rapidly to bother copying while the container runs)
EXCLUDEPRE=('*.dat.old')

# Extra directories outside of Docker appdata to back up.
# Format: "source_path:dest_name:local_snapshots:remote_snapshots"
#   source_path      — absolute path to the directory to back up
#   dest_name        — name used under $BACKUP_LOCATION/ExtraDirs/ and on remote
#   local_snapshots  — number of local snapshots to keep (falls back to DEFAULT_LOCAL_SNAPSHOTS)
#   remote_snapshots — number of remote version dirs to keep (falls back to DEFAULT_REMOTE_SNAPSHOTS)
#
# Example:
# EXTRA_DIRS=(
#     "/mnt/cache/project_triad:project_triad:3:2"
#     "/mnt/user/documents:documents:5:5"
# )
EXTRA_DIRS=()

# Containers to skip entirely — no backup, no config files created, no directories.
# More convenient than creating a per-app .conf with BACKUP="false" for each one.
# Example:
# EXCLUDE_CONTAINERS=(crappy_docker temp_container test_app)
EXCLUDE_CONTAINERS=()
