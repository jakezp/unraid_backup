###############################################################################
# default-backup.conf — Per-app configuration for backuparr
#
# Place a copy of this file (or a named variant like appname-backup.conf)
# in the app's backup directory: $BACKUP_LOCATION/Docker/<appname>/
#
# All settings are optional. If omitted, the global defaults from
# backuparr.conf (or hardcoded defaults in backuparr.sh) are used.
###############################################################################

# Docker stop timeout in seconds before force-killing the container.
# Set to 0 to skip stopping the container during backup (live rsync only).
# Default: 30 (from DEFAULT_TIMEOUT in backuparr.conf)
#TIMEOUT=30

# Set to "false" to skip backing up this container entirely.
# Default: "true"
#BACKUP="false"

# Set to "true" to always start the container after backup, even if it
# wasn't running when the backup started.
# Default: "false"
#FORCESTART="true"

# Per-app rsync file/pattern excludes. These are added to the global
# EXCLUDE list for this container only.
# Example: skip metadata caches and temp files
#EXCLUDES=(data/metadata cache/ '*.tmp')

# Per-app directory-content exclusion. Backs up the directory structure
# itself but excludes the contents within these directories.
# Translates to rsync --exclude 'dirname/*' for each entry.
# Useful for large upload/thumbnail/cache directories where you want
# the folder to exist on restore but don't need the files.
# Example:
#EXCLUDE_DIRS=(uploads/ thumbnails/ cache/images/)

# Number of local hard-link snapshots to keep for this app.
# Each snapshot is a dated directory (Snapshots/YYYY-MM-DD/) where
# unchanged files are hard-linked from the previous snapshot.
# N snapshots of mostly-unchanged data costs ~1x storage.
# Default: 3 (from DEFAULT_LOCAL_SNAPSHOTS in backuparr.conf)
#LOCAL_SNAPSHOTS=3

# Number of remote versioned backup directories to keep for this app.
# When GDRIVE_INCREMENTAL=true, changed/deleted files are moved to
# Versions/<appname>/YYYY-MM-DD/ on each upload. Old version dirs
# beyond this count are pruned.
# Default: 7 (from DEFAULT_REMOTE_SNAPSHOTS in backuparr.conf)
#REMOTE_SNAPSHOTS=7
